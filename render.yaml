# Render Blueprint — deploys the FastAPI app (API + dashboard) as one web service.
# Push this repo to GitHub, then in Render: New > Blueprint > pick this repo.
services:
  - type: web
    name: f1-podium-predictor
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Secret — Render prompts for the value in the dashboard (never stored in the repo).
      # Leave it unset and live weather simply falls back to historical data.
      - key: OPENWEATHER_API_KEY
        sync: false
